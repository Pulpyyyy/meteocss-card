name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: 'The version tag to release'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v3.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Build release zip
        run: |
          cd dist
          zip ../meteocss-card.zip meteocss-card.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "MeteoCSS Card ${{ inputs.tag }}"
          generate_release_notes: true
          files: meteocss-card.zip
